[build]
builder = "DOCKERFILE"
dockerfilePath = "services/api/Dockerfile"
watchPatterns = ["services/api/**", "packages/shared/**", "package.json", "package-lock.json"]

[deploy]
startCommand = "./scripts/start.sh"
healthcheckPath = "/api/v1/markets"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"

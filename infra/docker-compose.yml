services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parity
      POSTGRES_PASSWORD: parity
      POSTGRES_DB: parity
    ports:
      - "5432:5432"
    volumes:
      - parity_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  parity_pg:

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: parity
          POSTGRES_PASSWORD: parity
          POSTGRES_DB: parity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w @parity/shared
      - run: npm test -w @parity/shared
      - run: npm test -w @parity/api
      - name: API setup
        working-directory: services/api
        run: |
          cp .env.example .env
          npx prisma generate
          npx prisma db push
          npm run db:seed
      - run: npm run build -w @parity/api
      - run: npm run build -w @parity/web
